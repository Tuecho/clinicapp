services:
  redis_clinic:
    image: redis:7-alpine
    container_name: redis_clinic
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - clinic-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend_clinic:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend_clinic
    ports:
      - "5174:5173"
    env_file:
      - .env
    networks:
      - clinic-network
    restart: unless-stopped

  api_clinic:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: api_clinic
    ports:
      - "3001:3000"
    volumes:
      - ./backend:/app
      - ./backend/db-data:/app/data
    environment:
      - REDIS_HOST=redis_clinic
      - REDIS_PORT=6379
      - REDIS_ENABLED=true
    env_file:
      - .env
    networks:
      - clinic-network
    depends_on:
      redis_clinic:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:

networks:
  clinic-network:
    name: clinic-network
    external: false